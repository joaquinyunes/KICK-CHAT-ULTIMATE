<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SCB – Pools de Mensajes</title>
  <link rel="stylesheet" href="../css/main.css" />
</head>
<body class="chat-page">
  <header class="app-header">
    <span class="app-title">StreamChat Bridge · Pools</span>
    <div class="connection-status">
      <span id="status-badge" class="status-dot status-disconnected"></span>
      <span id="status-label">Desconectado</span>
      <button id="logout-btn" class="btn btn-ghost" style="margin-left:12px">Cerrar sesión</button>
    </div>
  </header>

  <nav class="tab-nav">
    <a href="/admin/dashboard" class="tab-btn">Dashboard</a>
    <a href="/admin/bots" class="tab-btn">Bots</a>
    <a href="/admin/clientes" class="tab-btn">Clientes</a>
    <a href="/admin/proxies" class="tab-btn">Proxies</a>
    <a href="/admin/pools" class="tab-btn active">Pools</a>
  </nav>

  <section class="tab-panel active">
    <div class="admin-grid">
      <div class="admin-card">
        <h3 class="admin-card-title">Nuevo Pool</h3>
        <div class="field">
          <label for="pool-name">Nombre del Pool</label>
          <input id="pool-name" type="text" placeholder="ej: Casino, Saludos, Deportivas" />
        </div>
        <div class="field">
          <label for="pool-messages">Mensajes (uno por línea)</label>
          <textarea id="pool-messages" class="bulk-textarea" rows="10" placeholder="mensaje 1&#10;mensaje 2&#10;mensaje 3"></textarea>
        </div>
        <button id="add-pool-btn" class="btn btn-primary">Guardar Pool</button>
        <p id="pool-msg" class="settings-msg" hidden></p>
      </div>

      <div class="admin-card admin-card-wide">
        <h3 class="admin-card-title">Todos los Pools</h3>
        <div id="pool-list">
          <p style="opacity:0.6;font-style:italic">Cargando...</p>
        </div>
      </div>
    </div>
  </section>

  <script type="module" src="../js/admin-pools.js"></script>
</body>
</html>
