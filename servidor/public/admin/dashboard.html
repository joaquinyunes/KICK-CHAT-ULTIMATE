<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SCB – Dashboard</title>
  <link rel="stylesheet" href="../css/main.css" />
  <style>
    body { min-height: 100vh; }
    .dash-stats { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 12px; margin-bottom: 20px; }
    .dash-num { font-size: 28px; font-weight: 700; font-family: var(--font-mono); line-height: 1.2; }
    .dash-label { font-size: 11px; color: var(--text-secondary); margin-top: 4px; text-transform: uppercase; letter-spacing: .5px; }
    .dash-card { animation: pl-bounce-in 0.45s cubic-bezier(0.34,1.56,0.64,1) both; }
    .dash-card:nth-child(1) { animation-delay:0.03s; }
    .dash-card:nth-child(2) { animation-delay:0.06s; }
    .dash-card:nth-child(3) { animation-delay:0.09s; }
    .dash-card:nth-child(4) { animation-delay:0.12s; }
    .dash-card:nth-child(5) { animation-delay:0.15s; }
    .dash-card:nth-child(6) { animation-delay:0.18s; }
    .dash-card:nth-child(7) { animation-delay:0.21s; }
    .dash-grid { display: grid; grid-template-columns: 2fr 1fr; gap: 16px; }
    .dash-section { min-height: 200px; }
    @media (max-width: 720px) { .dash-grid { grid-template-columns: 1fr; } }
    @media (prefers-reduced-motion: reduce) { .dash-card { animation: none; } }
  </style>
</head>
<body>
  <div class="pl-scene" aria-hidden="true"></div>
  <div class="pl-grid" aria-hidden="true"></div>
  <div class="pl-orbs" aria-hidden="true"><div class="pl-orb"></div><div class="pl-orb"></div><div class="pl-orb"></div></div>
  <div class="pl-grain" aria-hidden="true"></div>

  <div class="app-shell">
    <aside class="sidebar">
      <div class="sidebar-brand">
        <div class="logo-mark">
          <svg viewBox="0 0 52 52" fill="none" xmlns="http://www.w3.org/2000/svg">
            <circle cx="26" cy="26" r="25" stroke="#2A9D6F" stroke-width="1.2" opacity="0.4"/>
            <circle cx="14" cy="26" r="5.5" fill="#11151B" stroke="#3DDC97" stroke-width="2"/>
            <circle cx="38" cy="26" r="5.5" fill="#11151B" stroke="#3DDC97" stroke-width="2"/>
            <path d="M19.5 26H32.5" stroke="#3DDC97" stroke-width="2" stroke-linecap="round"/>
            <circle cx="26" cy="26" r="2" fill="#6FF0B8"/>
          </svg>
        </div>
        <span>StreamChat</span>
      </div>

      <nav class="nav-group">
        <div class="nav-eyebrow">General</div>
        <a href="/admin/dashboard" class="nav-link active">📊 Dashboard</a>
        <a href="/admin/bots" class="nav-link">🤖 Bots</a>
        <a href="/admin/clientes" class="nav-link">👥 Clientes</a>
        <a href="/admin/proxies" class="nav-link">🌐 Proxies</a>
      </nav>

      <div style="margin-top:auto;padding-top:16px;border-top:1px solid var(--line);display:flex;flex-direction:column;gap:8px">
        <span class="status-pill" style="align-self:flex-start">
          <span id="status-badge" class="status-dot"></span>
          <span id="status-label">Verificando…</span>
        </span>
        <button id="logout-btn" class="btn btn-primary" style="width:100%;font-size:11px;padding:9px 12px;background:transparent;color:var(--text-secondary);border:1px solid var(--line)">Cerrar sesión</button>
      </div>
    </aside>

    <main class="main-panel">
      <header class="page-header">
        <h2>Dashboard</h2>
        <p>Estado general del puente y actividad reciente</p>
      </header>

      <p id="dash-msg" class="settings-msg" hidden></p>

      <div class="dash-stats">
        <div class="card dash-card"><span class="dash-num" id="dash-total-bots" style="color:var(--signal)">—</span><span class="dash-label">Bots</span></div>
        <div class="card dash-card"><span class="dash-num" id="dash-oauth-bots" style="color:var(--signal-bright)">—</span><span class="dash-label">OAuth Conectados</span></div>
        <div class="card dash-card"><span class="dash-num" id="dash-total-clients" style="color:var(--signal)">—</span><span class="dash-label">Clientes</span></div>
        <div class="card dash-card"><span class="dash-num" id="dash-msgs-sent" style="color:var(--signal-bright)">—</span><span class="dash-label">Mensajes</span></div>
        <div class="card dash-card"><span class="dash-num" id="dash-uptime" style="font-size:20px;color:var(--text-primary)">—</span><span class="dash-label">Tiempo encendido</span></div>
        <div class="card dash-card"><span class="dash-num" id="dash-expired" style="color:var(--alert)">—</span><span class="dash-label">Clientes vencidos</span></div>
        <div class="card dash-card"><span class="dash-num" id="dash-total-proxies" style="color:var(--signal)">—</span><span class="dash-label">Proxies</span></div>
      </div>

      <div class="dash-grid">
        <div class="card dash-section">
          <h3 style="font-family:var(--font-display);font-size:15px;font-weight:600;margin:0 0 16px">Actividad reciente</h3>
          <div id="dash-recent-log">
            <div style="color:var(--text-muted);font-style:italic;text-align:center;padding:32px 0">Cargando...</div>
          </div>
        </div>
        <div class="card dash-section" style="display:flex;flex-direction:column;gap:10px">
          <h3 style="font-family:var(--font-display);font-size:15px;font-weight:600;margin:0">Acciones rápidas</h3>
          <button id="dash-oauth-btn" class="btn btn-primary" style="width:100%"><span class="btn-label">+ Conectar Kick</span></button>
          <button id="dash-create-client-btn" class="btn" style="width:100%;background:var(--bg-panel-raised);color:var(--text-secondary);border:1px solid var(--line);font-size:12px"><span class="btn-label">+ Crear Cliente</span></button>
          <button id="dash-agregar-bot-btn" class="btn" style="width:100%;background:var(--bg-panel-raised);color:var(--text-secondary);border:1px solid var(--line);font-size:12px"><span class="btn-label">+ Agregar Bot</span></button>
          <button id="dash-proxies-btn" class="btn" style="width:100%;background:var(--bg-panel-raised);color:var(--text-secondary);border:1px solid var(--line);font-size:12px"><span class="btn-label">↗ Gestionar Proxies</span></button>
        </div>
      </div>
    </main>
  </div>

  <script src="../js/pl-mascot.js"></script>
  <script type="module" src="../js/admin-dashboard.js"></script>
</body>
</html>
