<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>StreamChat Bridge – Chat</title>
  <link rel="stylesheet" href="css/main.css" />
</head>
<body class="chat-page">
  <header class="app-header">
    <span class="app-title">StreamChat Bridge</span>
    <div class="connection-status">
      <span id="status-badge" class="status-dot status-disconnected"></span>
      <span id="status-label">Desconectado</span>
    </div>
  </header>

  <nav class="tab-nav">
    <button class="tab-btn active" data-tab="chat">Chat</button>
    <button class="tab-btn" data-tab="settings">Ajustes</button>
  </nav>

  <section id="panel-chat" class="tab-panel active">

    <!-- Bots disponibles -->
    <div class="bots-bar">
      <span id="bots-info" class="bots-info">Cargando bots...</span>
    </div>

    <!-- Archivos cargados -->
    <div class="files-section">
      <div class="files-header">
        <span class="files-title">Archivos de mensajes</span>
        <button id="load-file-btn" class="btn btn-secondary btn-sm">+ Agregar .txt</button>
      </div>
      <ul id="file-list" class="file-list">
        <li class="empty-state">Sin archivos cargados.</li>
      </ul>
    </div>

    <!-- Progreso -->
    <div class="progress-track">
      <div id="progress-bar" class="progress-bar" style="width:0%"></div>
    </div>

    <!-- Mensajes del archivo activo -->
    <div class="msg-preview-header">
      <span id="active-file-name" class="active-file-name">Ningún archivo seleccionado</span>
      <span id="msg-count" class="msg-count"></span>
    </div>
    <ul id="msg-list" class="msg-list">
      <li class="empty-state">Cargá un archivo .txt para empezar.</li>
    </ul>

    <!-- Controles de envío -->
    <footer class="send-controls">
      <span id="send-status" class="send-status"></span>
      <div class="send-btns">
        <button id="send-once-btn" class="btn btn-ghost" disabled>Enviar siguiente</button>
        <button id="start-btn"     class="btn btn-primary" disabled>▶ Iniciar</button>
        <button id="stop-btn"      class="btn btn-danger"  disabled>■ Detener</button>
      </div>
    </footer>

  </section>

  <section id="panel-settings" class="tab-panel">
    <div class="settings-form">
      <div class="field">
        <label for="cfg-channel">Canal de destino</label>
        <input id="cfg-channel" type="text" placeholder="nombre-del-canal" spellcheck="false" />
      </div>
      <div class="field">
        <label for="cfg-interval-min">Intervalo mínimo (segundos)</label>
        <input id="cfg-interval-min" type="number" min="1" max="3600" value="3" />
      </div>
      <div class="field">
        <label for="cfg-interval-max">Intervalo máximo (segundos)</label>
        <input id="cfg-interval-max" type="number" min="1" max="3600" value="8" />
      </div>
      <div class="field">
        <label for="cfg-chatroom-id">Chatroom ID (opcional)</label>
        <input id="cfg-chatroom-id" type="number" placeholder="ej: 20548413" />
      </div>
      <button id="save-settings-btn" class="btn btn-primary">Guardar</button>
      <p id="settings-msg" class="settings-msg" hidden></p>
    </div>
  </section>



  <script type="module" src="js/chat-ui.js"></script>
</body>
</html>
